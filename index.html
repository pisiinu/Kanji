<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="google-site-verification" content="4bbm2JL48fxAG1m3TSloyhKAgEwCKESEURPzjY26DNw" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人名用漢字チェッカー｜創作命名ナビ｜創作・実名 漢字判定ナビ</title>
    <meta name="description" content="創作活動でキャラの命名に役立つ漢字検索サイト。人名に使えない漢字を区別して一括検索。小説、漫画、TRPG、芸名、ペンネームに。実在する名前と被らない個性的な名付けを。赤ちゃんの実用的な命名にも。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "創作命名ナビ",
      "alternateName": "人名用漢字チェッカー",
      "url": "https://kanji-naming.vercel.app/",
      "description": "創作活動におけるキャラクターの命名や、芸名・ペンネーム作成を支援するツール。人名に使用可能な常用漢字・人名用漢字2,999字を網羅し、あえて「人名に使えない漢字」を探すことで、唯一無二の個性的な名付けをサポートします。実在の命名にも。",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Windows, macOS, Android, iOS",
      "browserRequirements": "Requires JavaScript",
      "featureList": [
        "人名用漢字の判定",
        "名前に使えない漢字の調べ方",
        "キャラ名・芸名・ペンネームの命名支援",
        "画数・部首による直感検索",
        "赤ちゃんの名付け"
      ],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "JPY"
      }
    }
    </script>
<meta property="og:title" content="人名用漢字チェッカー｜創作命名ナビ">
<meta property="og:description" content="「人名に使えない漢字」から、個性的な名前を。小説・TRPG・ゲーム制作、芸名、ペンネームに最適な漢字判定ツール。">
<meta property="og:url" content="https://kanji-naming.vercel.app/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://kanji-naming.vercel.app/og-image.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="人名用漢字チェッカー｜創作命名ナビ">
<meta name="twitter:description" content="「人名に使えない漢字」から、個性的な名前を。小説・TRPG・ゲーム制作、芸名、ペンネームに最適な漢字判定ツール。">
<meta name="twitter:image" content="https://kanji-naming.vercel.app/og-image.png">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>創作命名ナビ<span class="visually-hidden">｜命名支援ツール</span></h1>
            <p>人名に「使えない・使える」が一目。<br>実在しない名前で、創作に個性を。</p>
            <h2 class="visually-hidden">人名に使える漢字は全て網羅。名前に使えない漢字を検索して、中二病な名前や古風な人名、幽霊苗字など、フィクション特有のユニークな名付けをサポートします。</h2>
        </header>
        
        <main>
            <section class="controls glass">
                <div class="mode-selector">
                    <label class="radio-label">
                        <input type="radio" name="mode" value="fiction" checked>
                        <span class="custom-radio"></span>
                        フィクション用 (使えない漢字のみ)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="mode" value="all">
                        <span class="custom-radio"></span>
                        全漢字 (すべて)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="mode" value="real">
                        <span class="custom-radio"></span>
                        実名用 (使える漢字のみ)
                    </label>
                </div>
                
                <div class="filters">
                    <div class="input-group">
                        <input type="text" id="reading-filter" placeholder="読み方で検索 (例: ま, マ)">
                        <select id="match-type-select">
                            <option value="prefix" selected>前方一致 (あ → あい)</option>
                            <option value="exact">完全一致 (あ → あのみ)</option>
                            <option value="partial">部分一致 (あ → しあ)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <select id="radical-select">
                            <option value="">部首で検索: 指定なし</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <select id="sort-select">
                            <option value="default">並び替え: デフォルト</option>
                            <option value="strokes">並び替え: 画数順</option>
                        </select>
                    </div>
                </div>
            </section>
            
            <section class="results-section">
                <div id="results-count" class="results-count"></div>
                <div id="kanji-grid" class="kanji-grid">
                    <!-- Cards will be dynamically inserted here -->
                </div>
            </section>
        </main>
        <footer class="app-footer">
            Amazonのアソシエイトとして、創作命名アシスタントは適格販売により収入を得ています。
        </footer>
    </div>
    
    <script src="kanji_data.js"></script>
    <script src="sponsor_links.js"></script>
    <script src="app.js"></script>
</body>
</html>
