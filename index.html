<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人名用漢字チェッカー｜創作命名アシスタント｜創作・実名 漢字判定ナビ</title>
    <meta name="description" content="人名に使えない漢字を区別して一括検索。「使えない漢字」をあえて使うことで、実在の名前と被らない創作キャラの命名が可能です。もちろん、赤ちゃんの正しい名付け（常用・人名用漢字）の確認にも対応。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>創作命名アシスタント<span class="visually-hidden">｜命名支援ツール</span></h1>
            <p>人名に「使えない・使える」を瞬時に判定。<br>実在しない名前で、創作に唯一無二の個性を。</p>
            <h2 class="visually-hidden">常用漢字・人名用漢字の2,999字を網羅。使えない漢字（表外漢字）を検索して、フィクション特有のユニークな名付けをサポートします。</h2>
        </header>
        
        <main>
            <section class="controls glass">
                <div class="mode-selector">
                    <label class="radio-label">
                        <input type="radio" name="mode" value="fiction" checked>
                        <span class="custom-radio"></span>
                        フィクション用 (使えない漢字のみ)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="mode" value="all">
                        <span class="custom-radio"></span>
                        全漢字 (すべて)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="mode" value="real">
                        <span class="custom-radio"></span>
                        実名用 (使える漢字のみ)
                    </label>
                </div>
                
                <div class="filters">
                    <div class="input-group">
                        <input type="text" id="reading-filter" placeholder="読み方で検索 (例: ま, マ)">
                        <select id="match-type-select">
                            <option value="prefix" selected>前方一致 (あ → あい)</option>
                            <option value="exact">完全一致 (あ → あのみ)</option>
                            <option value="partial">部分一致 (あ → しあ)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <select id="radical-select">
                            <option value="">部首で検索: 指定なし</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <select id="sort-select">
                            <option value="default">並び替え: デフォルト</option>
                            <option value="strokes">並び替え: 画数順</option>
                        </select>
                    </div>
                </div>
            </section>
            
            <section class="results-section">
                <div id="results-count" class="results-count"></div>
                <div id="kanji-grid" class="kanji-grid">
                    <!-- Cards will be dynamically inserted here -->
                </div>
            </section>
        </main>
        <footer class="app-footer">
            Amazonのアソシエイトとして、創作命名アシスタントは適格販売により収入を得ています。
        </footer>
    </div>
    
    <script src="kanji_data.js"></script>
    <script src="sponsor_links.js"></script>
    <script src="app.js"></script>
</body>
</html>
